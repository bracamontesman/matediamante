name: Desplegar sitio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  construir:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v5

      - name: Instalar, construir y subir artefacto
        uses: withastro/action@v5
        with:
          path: .
        env:
          URL_SITIO: ${{ vars.URL_SITIO || 'https://matediamante.com' }}

  desplegar:
    needs: construir
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.despliegue.outputs.page_url }}

    steps:
      - name: Publicar en GitHub Pages
        id: despliegue
        uses: actions/deploy-pages@v4
